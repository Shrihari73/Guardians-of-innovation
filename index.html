<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Armor Garage</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="garage-audio" src="ironman_theme.mp3" loop></audio>

    <div id="poster-screen" class="poster-screen">
        <div class="poster-overlay"></div>
        <div id="flash-overlay" class="flash-overlay"></div>

        <div class="poster-content" id="poster-content">
            <div class="arc-container" id="arc-container">
                <div class="arc-reactor">
                    <div class="arc-core"></div>
                    <div class="arc-ring"></div>
                </div>
            </div>

            <h1>ARMOR GARAGE v1.0</h1>
            <p>VEHICLE PROTOCODE PROTOCOLS ACTIVE</p>
            <button class="launch-btn" id="launch-btn">Initialize Systems</button>
        </div>
    </div>

    <div id="main-content" class="main-content hidden">
        
        <div class="stark-hud-bg">
            <div class="hud-grid-lines"></div>
            <div class="hud-ring ring-top-left"></div>
            <div class="hud-ring ring-bottom-right"></div>
            <div class="hud-data-stream stream-left" id="stream-left"></div>
            <div class="hud-data-stream stream-right" id="stream-right"></div>
        </div>

        <header class="hud-header">
            <div class="logo">STARK IND.</div>
            
            <div class="header-controls">
                <nav class="filter-nav">
                    <button class="filter-btn active" data-filter="all">ALL UNITS</button>
                    <button class="filter-btn" data-filter="car">CARS</button>
                    <button class="filter-btn" data-filter="bike">BIKES</button>
                </nav>
                <button id="mute-btn" class="mute-btn">🔊 MUTE</button>
            </div>
        </header>

        <main class="showcase-grid">
            
            <div class="vehicle-card" data-category="car">
                <img src="car1.png" alt="Ultra-Luxury Sedan" class="vehicle-img">
                <div class="card-overlay-title">ULTRA-LUXURY SEDAN</div>
                <div class="hidden-details" data-tag="UNIT // V12-SEDAN" data-title="ULTRA-LUXURY SEDAN" data-desc="<strong>Engine:</strong> 6,750 cc Twin-Turbo V12 | 8-Speed Automatic AWD<br><br><strong>Performance:</strong> 563 bhp & 820 Nm Max Torque<br><br><strong>Fuel Type:</strong> Petrol"></div>
            </div>

            <div class="vehicle-card" data-category="car">
                <img src="car2.png" alt="Mercedes-Benz A-Class" class="vehicle-img">
                <div class="card-overlay-title">A-CLASS LIMOUSINE</div>
                <div class="hidden-details" data-tag="UNIT // A-CLASS" data-title="A-CLASS LIMOUSINE" data-desc="<strong>Petrol (A 200):</strong> 1,332 cc Turbo I4 (~₹45.80 Lakh)<br><br><strong>Diesel (A 200d):</strong> 1,950 cc I4 (~₹48.55 Lakh)<br><br><strong>Category:</strong> Luxury Sedan Variant"></div>
            </div>

            <div class="vehicle-card" data-category="car">
                <img src="car3.png" alt="Lamborghini Revuelto" class="vehicle-img">
                <div class="card-overlay-title">LAMBORGHINI REVUELTO</div>
                <div class="hidden-details" data-tag="UNIT // REVUELTO" data-title="LAMBORGHINI REVUELTO" data-desc="<strong>Engine:</strong> 6498 cc Hybrid V12 Engine<br><br><strong>Category:</strong> Plug-in Hybrid Super Sports Car<br><br><strong>Price Value:</strong> ~ ₹8.89 Crore"></div>
            </div>

            <div class="vehicle-card" data-category="bike">
                <img src="bike1.png" alt="Harley-Davidson X440" class="vehicle-img">
                <div class="card-overlay-title">HARLEY-DAVIDSON X440</div>
                <div class="hidden-details" data-tag="UNIT // X440" data-title="HARLEY-DAVIDSON X440" data-desc="<strong>Category:</strong> Roadster (Denim / Vivid / S)<br><br><strong>Engine:</strong> 440 cc Displacement<br><br><strong>Price Value:</strong> ₹2.35 Lakh - ₹2.79 Lakh"></div>
            </div>

            <div class="vehicle-card" data-category="bike">
                <img src="bike2.png" alt="Triumph Speed T4" class="vehicle-img">
                <div class="card-overlay-title">TRIUMPH SPEED T4</div>
                <div class="hidden-details" data-tag="UNIT // SPEED-T4" data-title="TRIUMPH SPEED T4" data-desc="<strong>Category:</strong> Roadster / Entry Level Cycle<br><br><strong>Engine:</strong> 349 cc Displacement<br><br><strong>Price Value:</strong> ~ ₹1,99,000"></div>
            </div>

            <div class="vehicle-card" data-category="bike">
                <img src="bike3.png" alt="Kawasaki W175" class="vehicle-img">
                <div class="card-overlay-title">KAWASAKI W175</div>
                <div class="hidden-details" data-tag="UNIT // W175" data-title="KAWASAKI W175" data-desc="<strong>Category:</strong> Commuter / Retro Classic<br><br><strong>Engine:</strong> 177 cc Displacement<br><br><strong>Price Value:</strong> ~ ₹1.15 Lakhs"></div>
            </div>

        </main>
    </div>

    <div id="hud-modal" class="hud-modal hidden">
        <canvas id="spark-canvas"></canvas>
        <div class="modal-container">
            <button class="close-modal-btn" id="close-modal">&times;</button>
            <div class="modal-layout">
                <div class="modal-left">
                    <img id="modal-img" src="" alt="Diagnostic View">
                </div>
                <div class="modal-right">
                    <span id="modal-tag" class="serial-tag">UNIT // SYSTEM_SCAN</span>
                    <h2 id="modal-title">SPECIFICATION DATA</h2>
                    <div id="modal-desc" class="diagnostic-readout"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
